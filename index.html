<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Amor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Para o Meu Amor ❤️</h1>
    </header>

    <main>
        <section class="contador-container">
            <h2>Tempo Juntos:</h2>
            <div id="contador">Carregando tempo...</div>
        </section>

        <section class="playlist-container">
            <h2>Nossa Playlist ❤️</h2>
            <p>As músicas que embalam a nossa história:</p>
            
            <iframe 
                style="border-radius:12px" 
                src="https://open.spotify.com/playlist/1UkiDCeYsNazAJY5Z1CyTt?si=47bad0fd58ff432c" 
                width="100%" 
                height="352" 
                frameBorder="0" 
                allowfullscreen="" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy">
            </iframe>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
